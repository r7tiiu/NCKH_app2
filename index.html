<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kiểm tra Stress - Giới thiệu</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e0e7ff, #f0f4f8);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo { font-size: 4rem; margin-bottom: 10px; }
        h1 { font-size: 2rem; color: #1e293b; margin-bottom: 8px; }
        .subtitle { color: #64748b; font-size: 1rem; margin-bottom: 30px; line-height: 1.5; }
        .features {
            text-align: left;
            margin: 20px 0 30px;
            padding-left: 20px;
        }
        .features li {
            list-style: none;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .features li::before { content: "✅"; font-size: 1.2rem; }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 10px;
        }
        .btn {
            padding: 18px 24px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(0,0,0,0.15);
            width: 100%;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #3b82f6; }
        .btn-primary:active { background: #2563eb; }
        .btn-secondary { background: #10b981; margin-top: 5px; }
        .btn-secondary:active { background: #059669; }
        .btn-icon { font-size: 1.5rem; }
        .note {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .install-guide {
            display: none;
            margin-top: 12px;
            font-size: 0.9rem;
            color: #475569;
            background: #f1f5f9;
            padding: 16px;
            border-radius: 16px;
            text-align: left;
            border: 1px solid #d1d9e6;
        }
        .install-guide ul { margin: 8px 0 0 20px; list-style: decimal; }
        .install-guide strong { color: #1e293b; }
        @media (max-width: 420px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🧠</div>
        <h1>Kiểm tra Stress</h1>
        <p class="subtitle">Đánh giá mức độ căng thẳng của bạn với bộ câu hỏi khoa học</p>
        <ul class="features">
            <li>~20 câu hỏi được thiết kế chuyên sâu</li>
            <li>Phân tích 6 khía cạnh khác nhau</li>
            <li>Kết quả và lời khuyên chi tiết</li>
            <li>Hoàn toàn ẩn danh, không lưu dữ liệu</li>
        </ul>
        <div class="btn-group">
            <a href="survey.html" class="btn btn-primary">
                <span class="btn-icon">📋</span> Bắt đầu khảo sát
            </a>
            <button id="installBtn" class="btn btn-secondary" style="display: none;">
                <span class="btn-icon">📲</span> <span id="installBtnText">Cài đặt ứng dụng</span>
            </button>
            <div id="installGuide" class="install-guide">
                </div>
        </div>
        <p class="note">⏱️ Thời gian hoàn thành: khoảng 3 phút</p>
    </div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        const installGuide = document.getElementById('installGuide');
        const installBtnText = document.getElementById('installBtnText');

        // Hàm kiểm tra thiết bị iOS (iPhone, iPad)
        const isIOS = () => {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        };

        // 1. LẮNG NGHE SỰ KIỆN CÀI ĐẶT CỦA ANDROID
        window.addEventListener('beforeinstallprompt', (e) => {
            // Ngăn chặn thanh banner mặc định xấu xí của trình duyệt hiện lên
            e.preventDefault();
            // Lưu sự kiện kích hoạt popup vào biến này để dùng khi click nút
            deferredPrompt = e;
            
            // Bây giờ điều kiện Android đã sẵn sàng -> Cho hiển thị nút cài đặt 1-click lên
            installBtn.style.display = 'flex';
            installBtnText.textContent = 'Cài đặt ứng dụng';
        });

        // 2. KIỂM TRA TRẠNG THÁI KHI TRANH WEB TẢI XONG
        window.addEventListener('load', () => {
            // Đăng ký Service Worker (Bắt buộc phải có để kích hoạt PWA)
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
            }

            // Nếu người dùng đã cài app rồi và đang mở ở bản app độc lập -> Ẩn toàn bộ nút cài đặt đi
            if (window.matchMedia('(display-mode: standalone)').matches) {
                installBtn.style.display = 'none';
                installGuide.style.display = 'none';
                return;
            }

            // Xử lý riêng giao diện cho iPhone (vì iOS không chạy sự kiện tự động phía trên)
            if (isIOS()) {
                // Hiện nút bấm nhưng đổi tên text thành hướng dẫn cho iPhone
                installBtn.style.display = 'flex';
                installBtnText.textContent = 'Cách tải về iPhone';
                
                // Chuẩn bị sẵn nội dung hướng dẫn Safari
                installGuide.innerHTML = `
                    <p style="margin-bottom: 8px;">📱 Để thêm ứng dụng này vào màn hình chính iPhone của bạn:</p>
                    <ul>
                        <li>Mở trang web này bằng trình duyệt <strong>Safari</strong>.</li>
                        <li>Nhấn vào nút <strong>Chia sẻ (Share)</strong> <span style="font-size:1.1rem">⎋</span> ở thanh công cụ phía dưới màn hình.</li>
                        <li>Cuộn xuống dưới và chọn <strong>Thêm vào MH chính (Add to Home Screen)</strong>.</li>
                    </ul>
                `;
            } else {
                // Chuẩn bị sẵn hướng dẫn dự phòng cho Android nếu trình duyệt cũ không hỗ trợ tự động
                installGuide.innerHTML = `
                    <p style="margin-bottom: 8px;">📱 Để thêm ứng dụng này vào màn hình chính Android:</p>
                    <ul>
                        <li>Mở trang web này bằng trình duyệt <strong>Chrome</strong>.</li>
                        <li>Nhấn vào biểu tượng <strong>Ba chấm (⋮)</strong> ở góc phải trình duyệt Chrome.</li>
                        <li>Chọn mục <strong>Thêm vào màn hình chính</strong> hoặc <strong>Cài đặt ứng dụng</strong>.</li>
                    </ul>
                `;
            }
        });

        // 3. XỬ LÝ SỰ KIỆN CLICK NÚT CÀI ĐẶT
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // HÀNH ĐỘNG 1-CLICK TRÊN ANDROID: Gọi popup hệ thống xuất hiện
                deferredPrompt.prompt();
                
                // Chờ xem người dùng bấm "Thêm" hay bấm "Hủy" trên popup
                const result = await deferredPrompt.userChoice;
                if (result.outcome === 'accepted') {
                    console.log('Người dùng đã đồng ý cài đặt app.');
                    installBtn.style.display = 'none';
                    installGuide.style.display = 'none';
                } else {
                    console.log('Người dùng đã bấm hủy popup.');
                    // Nếu họ hủy, ta mở khung hướng dẫn thủ công phòng khi họ đổi ý
                    installGuide.style.display = 'block';
                }
                // Xóa prompt đã dùng đi vì nó chỉ dùng được 1 lần duy nhất
                deferredPrompt = null;
            } else {
                // HÀNH ĐỘNG TRÊN IPHONE: Bật/Tắt (Toggle) khung hiển thị chữ hướng dẫn
                if (installGuide.style.display === 'block') {
                    installGuide.style.display = 'none';
                } else {
                    installGuide.style.display = 'block';
                }
            }
        });

        // Ẩn nút hoàn toàn nếu hệ thống báo ứng dụng đã được cài thành công
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            installGuide.style.display = 'none';
        });
    </script>
</body>
</html>
